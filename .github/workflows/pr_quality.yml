name: PR Quality

# CI backstop for the PR-review workflow: on every PR to develop/main, compile and
# test so a reviewer sees a green/red check before reading the diff. No local
# Android toolchain needed to review.
#
# Note: detekt/ktlint are not configured in this repo, so there is no lint step.
# Add one if/when a static-analysis tool is introduced.

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: pr-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile (JVM)
        run: ./gradlew compileKotlinJvm

      - name: Unit tests (JVM)
        run: ./gradlew jvmTest
