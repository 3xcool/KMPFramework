name: Publish Framework

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.0.4). The leading 'v' is optional and will be stripped."
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        # Tag-push trigger: derive from refs/tags/vX.Y.Z (strip the leading 'v').
        # Manual workflow_dispatch: read inputs.version (also strip any leading 'v'
        # so the user can paste either "0.0.4" or "v0.0.4").
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          VERSION="${RAW#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved publish version: $VERSION"

      - name: Publish framework modules
        # --max-workers=1 serializes uploads to GitHub Packages. GitHub Packages refuses
        # to overwrite immutable release artifacts, and Gradle's automatic retry on transient
        # network blips can race with parallel uploads, causing 409 Conflict on .md5/.sha files
        # that were already uploaded by a sibling task. Serializing eliminates the race.
        # The publishing tasks themselves are I/O bound, so the speed cost is small.
        run: |
          ./gradlew \
            :framework:sdk:publish \
            :framework:kompass:publish \
            :framework:core:designsystem:publish \
            :framework:core:data:publish \
            :framework:core:domain:publish \
            :framework:core:presentation:publish \
            :framework:logger:publish \
            --max-workers=1 \
            -PframeworkVersion=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
