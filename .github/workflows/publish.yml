name: Publish Framework

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish framework modules
        run: |
          ./gradlew \
            :framework:sdk:publish \
            :framework:kompass:publish \
            :framework:core:designsystem:publish \
            :framework:core:data:publish \
            :framework:core:domain:publish \
            :framework:core:presentation:publish \
            :framework:logger:publish \
            -PframeworkVersion=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
