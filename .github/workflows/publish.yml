name: Publish Framework

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish framework modules
        # --max-workers=1 serializes uploads to GitHub Packages. GitHub Packages refuses
        # to overwrite immutable release artifacts, and Gradle's automatic retry on transient
        # network blips can race with parallel uploads, causing 409 Conflict on .md5/.sha files
        # that were already uploaded by a sibling task. Serializing eliminates the race.
        # The publishing tasks themselves are I/O bound, so the speed cost is small.
        run: |
          ./gradlew \
            :framework:sdk:publish \
            :framework:kompass:publish \
            :framework:core:designsystem:publish \
            :framework:core:data:publish \
            :framework:core:domain:publish \
            :framework:core:presentation:publish \
            :framework:logger:publish \
            --max-workers=1 \
            -PframeworkVersion=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
